name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase: Docker image refs must be lowercase, but
  # github.repository_owner preserves the account's actual casing
  # (Bims-creator), so it can't be used directly here.
  IMAGE_PREFIX: bims-creator/orderflow

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-service, worker-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.service }}/package.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.service }}
        run: npm install

      - name: Run unit tests
        working-directory: apps/${{ matrix.service }}
        run: npm test

  lint:
    name: Lint Dockerfiles & Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles with hadolint
        run: |
          for svc in api-service worker-service; do
            echo "== apps/$svc/Dockerfile =="
            docker run --rm -i hadolint/hadolint < apps/$svc/Dockerfile
          done

      - name: Validate rendered manifests with kubeconform
        run: |
          for overlay in staging production; do
            echo "== k8s/overlays/$overlay =="
            kubectl kustomize k8s/overlays/$overlay | \
              docker run --rm -i ghcr.io/yannh/kubeconform:latest \
                -strict -summary \
                -skip ServiceMonitor,PrometheusRule \
                -ignore-missing-schemas
          done

  build-scan-push:
    name: Build, scan & push (${{ matrix.service }})
    needs: [test, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-service, worker-service]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    name: Promote images to production overlay
    needs: build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tags to this commit's SHA
        run: |
          sed -i "s|newTag: .*|newTag: ${{ github.sha }}|" k8s/overlays/production/kustomization.yaml
          cat k8s/overlays/production/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: promote orderflow images to ${{ github.sha }} [skip ci]"
            git push
          fi
