apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - redis.yaml
  - api-service.yaml
  - worker-service.yaml
  - prometheus-rules.yaml

configMapGenerator:
  - name: orderflow-grafana-dashboard
    files:
      - orderflow-dashboard.json=dashboards/orderflow-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"

labels:
  - pairs:
      app.kubernetes.io/part-of: orderflow
      app.kubernetes.io/managed-by: kustomize
